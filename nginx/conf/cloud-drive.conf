# AI Personal Cloud Drive - Nginx Configuration
# MVP: HTTP-only for now. Uncomment SSL sections after obtaining certificates.

upstream backend {
    server 127.0.0.1:8000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    listen [::]:80;
    server_name files.balabalashowtime.icu;

    # Redirect to HTTPS once SSL is configured
    # return 301 https://$host$request_uri;

    # For Certbot validation (uncomment when using Let's Encrypt)
    # location /.well-known/acme-challenge/ {
    #     root /path/to/certbot/www;
    # }

    # Security: hide server version
    server_tokens off;

    # Limit connections per IP
    limit_conn conn_limit 20;

    # Frontend static files
    location / {
        root D:/CloudDrive/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # API backend
    location /api/ {
        # Login rate limiting
        location /api/auth/login {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload size limit
        client_max_body_size 10240m;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

